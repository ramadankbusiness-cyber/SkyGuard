name: Build SkyGuard APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Cordova and Build
        run: |
          npm install -g cordova
          # إنشاء مشروع كوردوفا جديد نظيف تماماً في فولدر فرعي
          cordova create build_dir com.ramadan.skyguard "SkyGuard Drone"
          
          # نقل ملفات الأكواد والإعدادات الخاصة بك لداخل المشروع الجديد
          cp config.xml build_dir/config.xml
          cp index.html build_dir/www/index.html
          cp script.js build_dir/www/script.js
          
          # الدخول للمشروع وبناء الأندرويد
          cd build_dir
          cordova platform add android --no-telemetry
          cordova build android --debug --no-telemetry
          
          # نقل الـ APK النهائي للخارج عشان الأكشن يشوفه ويرفعه لك
          mkdir -p ../output_apk
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk ../output_apk/SkyGuard_Drone.apk

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: SkyGuard_Drone_APK
          path: output_apk/SkyGuard_Drone.apk
